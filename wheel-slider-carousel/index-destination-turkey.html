<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel Carousel</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!--
    Section verileri — JS bu listeyi DOM'dan okur, section sayısı artınca çark otomatik eşit paylaşır.
    Razor migrasyonu: <ol> içini @foreach (var s in Model.Sections) { <li data-id="@s.Id" ...></li> } ile oluştur.
    data-sky / data-glow / data-glow-color / data-ridge / data-crater : boşlukla ayrılmış sayı/hex değerleri
  -->
  <ol id="section-data" hidden aria-hidden="true">
    <li data-id="01" data-title="Seferihisar"
      data-copy="İzmir’in güneyinde yer alan Seferihisar, doğa, tarih ve denizin buluşma noktasıdır. Türkiye’nin Cittaslow hareketine katılan ilk ilçesidir."
      data-action="TURA KATIL" data-map-label="İzmir, Seferihisar"
      data-image="https://storage.googleapis.com/goturkiyev2-storage/Root/goturkiye-v2/Seferihisar_banner.jpg"
      data-genre="Doğa, Kültür, Sakin Şehir" data-platform="Ege Bölgesi" data-source="https://goturkiye.com/seferihisar"
      data-sky="#181210 #100c0a #040402" data-glow="0.48 0.44 0.42" data-glow-color="200 160 100" data-ridge="120 80 48"
      data-crater="0.44 0.54 0.20" data-figure="0.44"></li>
    <li data-id="02" data-title="Gökçeada"
      data-copy="Kuzeybatı Ege’de yer alan Gökçeada, Türkiye’nin en büyük adasıdır. Eşsiz coğrafyası ve korunan doğal kaynaklarıyla ünlüdür."
      data-action="YÖN DEĞİŞTİR" data-map-label="Çanakkale, Gökçeada"
      data-image="https://storage.googleapis.com/goturkiyev2-storage/Root/goturkiye-v2/gokceada_banner.jpg"
      data-genre="Doğa, Deniz, Ada" data-platform="Ege Denizi" data-source="https://goturkiye.com/gokceada"
      data-sky="#1a1600 #120f00 #060500" data-glow="0.50 0.44 0.42" data-glow-color="230 210 60" data-ridge="130 110 28"
      data-crater="0.46 0.52 0.22" data-figure="0.46"></li>
    <li data-id="03" data-title="Perşembe"
      data-copy="Aybastı ilçesindeki yaylanın rakımı yaklaşık 1500 metredir. Doğal güzellikleriyle ünlüdür."
      data-action="TURA KATIL" data-map-label="Ordu, Perşembe Yaylası"
      data-image="https://storage.googleapis.com/goturkiyev2-storage/Root/goturkiye-v2/persembe_banner.jpg"
      data-genre="Doğa, Yayla, Karadeniz" data-platform="Karadeniz Bölgesi" data-source="https://goturkiye.com/persembe"
      data-sky="#101420 #0a0e18 #030508" data-glow="0.46 0.38 0.50" data-glow-color="160 180 220" data-ridge="50 70 120"
      data-crater="0.42 0.52 0.18" data-figure="0.40"></li>
    <li data-id="04" data-title="Gaziantep"
      data-copy="Gaziantep, zengin gastronomi mirasıyla UNESCO Yaratıcı Şehirler Ağı’nda yer almaktadır."
      data-action="LEZZET KEŞFİ" data-map-label="Gaziantep"
      data-image="https://storage.googleapis.com/goturkiyev2-storage/Root/goturkiye-v2/gaziantep_banner.jpg"
      data-genre="Gastronomi, Kültür, Tarih" data-platform="Güneydoğu Anadolu Bölgesi"
      data-source="https://goturkiye.com/gaziantep" data-sky="#200810 #160608 #060204" data-glow="0.52 0.46 0.48"
      data-glow-color="220 60 120" data-ridge="140 40 80" data-crater="0.48 0.50 0.20" data-figure="0.42"></li>
    <li data-id="05" data-title="Köyceğiz"
      data-copy="Akdeniz’in en doğusunda, Ege Denizi’nin en güneyinde, Karya ve Likya uygarlıklarının kesişiminde; mavinin ve yeşilin dans ettiği, tarihi kadar eski bir bölge."
      data-action="YOL AL" data-map-label="Muğla, Köyceğiz"
      data-image="https://storage.googleapis.com/goturkiyev2-storage/Root/goturkiye-v2/koycegizkapak.jpg"
      data-genre="Doğa, Tarih, Göl" data-platform="Ege & Akdeniz" data-source="https://goturkiye.com/koycegiz"
      data-sky="#0e1808 #0a1206 #040502" data-glow="0.46 0.44 0.44" data-glow-color="100 160 60" data-ridge="44 90 36"
      data-crater="0.40 0.54 0.18" data-figure="0.38"></li>
    <li data-id="06" data-title="Hatay"
      data-copy="Hatay, Akdeniz Bölgesi'nde yer alır ve çok kültürlü yapısıyla öne çıkar. UNESCO tarafından gastronomi alanında Yaratıcı Şehirler Ağı'na dahil edilmiştir. Zengin mutfağı, tarihi ve mozaikleriyle ünlüdür."
      data-action="KEŞFET" data-map-label="Hatay"
      data-image="https://storage.googleapis.com/goturkiyev2-storage/Root/goturkiye-v2/hatay_banner.jpg"
      data-genre="Gastronomi, Tarih, Kültür" data-platform="Akdeniz Bölgesi" data-source="https://goturkiye.com/hatay"
      data-sky="#1e1400 #140e00 #060400" data-glow="0.50 0.42 0.44" data-glow-color="240 190 40" data-ridge="150 110 28"
      data-crater="0.44 0.52 0.20" data-figure="0.42"></li>
  </ol>

  <div class="board-card">
    <main class="scene" data-default-section="01" aria-label="Gorsel arayuz calismasi">
      <div class="background background--current" aria-hidden="true"></div>
      <div class="background background--next" aria-hidden="true"></div>
      <canvas id="terrainCanvas" aria-hidden="true"></canvas>
      <div class="grain" aria-hidden="true"></div>
      <div class="shade" aria-hidden="true"></div>

      <button class="info-button" aria-label="Bilgi" aria-expanded="false">
        <span>i</span>
      </button>

      <div class="info-panel" aria-hidden="true">
        <p class="info-panel__year"></p>
        <p class="info-panel__genre"></p>
        <p class="info-panel__platform"></p>
        <p class="info-panel__source"></p>
      </div>

      <section class="wheel" aria-label="Bolum navigasyonu">
        <div class="wheel__outer">
          <div class="wheel__active-slice"></div>
          <div class="wheel__segments"></div>
        </div>
        <div class="wheel__lens" aria-hidden="true">
          <span class="wheel__lens-title" style="visibility: hidden;"></span>
        </div>
        <div class="wheel__labels"></div>
      </section>

      <section class="content" aria-label="Aktif bolum icerigi" aria-live="polite">
        <h1></h1>
        <span class="rule" aria-hidden="true"></span>
        <p></p>
        <button class="cta" type="button"></button>
      </section>

      <aside class="mini-map" aria-label="Mini harita">
        <div class="mini-map__line mini-map__line--h"></div>
        <div class="mini-map__line mini-map__line--v"></div>
        <div class="mini-map__label"></div>
        <div class="mini-map__pin"></div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
